name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static site bundle
        run: |
          mkdir dist
          cp index.html dist/
          cp styles.css dist/
          cp app.js dist/
          cp -r app dist/
          cp vocab-data.js dist/
          cp abbreviation-data.js dist/
          cp sentence-bank-data.js dist/
          cp hebrew-verbs.js dist/
          cp hebrew-idioms.js dist/
          cp .nojekyll dist/
          cp -r assets dist/

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
